name="aodi-website"
main = "server/worker.ts"
compatibility_date = "2026-02-15"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[assets]
directory = "apps/web/public"
binding = "ASSETS"

[vars]
NODE_ENV = "production"

[observability]
enabled = true
head_sampling_rate = 1